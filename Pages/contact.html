<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <meta name="description" content="Contact us and share your favorite type of coffee!">
  <meta name="keywords" content="Coffe, World of Coffee, Coffee Types, 
  Coffee brewing methods, How to brew coffee, History of Coffee, Best coffee recipes">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="../media/logo.png">
</head>

<body>
    <header>
        <img src="../Media/logo.png" alt="World of Coffee Logo" class="nav-logo">
        <h1>World of Coffee</h1>
        <h2>Feel free to contact us!</h2>
        <nav>
            <ul class="navbar">
                <li><a href="../index.html">Home</a></li>
                <li><a href="types.html">Coffee Types</a></li>
                <li><a href="brewing.html">Brewing Methods</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contact Us</h2>
        <form action="#" method="POST" class="contact-form">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required placeholder="Your Name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required placeholder="Your Email">

            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="4" required placeholder="Write your message here"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </main>
    
</body>

</html>
